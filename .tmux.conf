# I'm using Tmux Plugin Manager
# https://github.com/tmux-plugins/tpm

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'egel/tmux-gruvbox'
# set desired theme options...
set -g @tmux-gruvbox 'dark256' # or 'dark256', 'light', 'light256'

set -g @plugin 'tmux-plugins/tmux-resurrect'
# prefix + Alt + s   → save tmux state
# prefix + Alt + r   → restore tmux state

# set -g @plugin 'tmux-plugins/tmux-continuum'
# enable auto restore on tmux start
set -g @continuum-restore 'on'
# auto save every 15 minutes
set -g @continuum-save-interval '15'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


# VERY MINIMALISTIC :)

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using \ and -
bind \\ split-window -h
bind - split-window -v
unbind '"'
unbind %

# split panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch sessions
bind j switch-client -p
bind k switch-client -n

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

set -g allow-passthrough on

# start window numbering at 1
set -g base-index 1

# start pane numbering at 1
set -g pane-base-index 1

# renumber windows automatically after closing one
set -g renumber-windows on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
