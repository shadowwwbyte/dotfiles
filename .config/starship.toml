format = """
$username$hostname $directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$conda\
$character"""

[username]
show_always = true
style_user = "bold green"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bold green"
format = "[@$hostname]($style)"


[directory]
style = "bold cyan"

[character]
success_symbol = "[‚ùØ](green)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bold bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "bold cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "bold yellow"

[python]
# symbol = "ÓòÜ "
format = "[$virtualenv]($style) "
style = "bold bright-black"
detect_extensions = []
detect_files = []
# symbol = "ÓòÜ "
# style = "bold yellow"
# format = "[${symbol}(${virtualenv})]($style) "
# detect_extensions = []
# detect_files = []

[conda]
symbol = "Óúº "
style = "bold yellow"
format = "[$symbol$environment]($style) "
ignore_base = true
